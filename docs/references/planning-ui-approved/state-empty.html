<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KISS PM — Пустой план</title>
  <link rel="stylesheet" href="_partials.css" />
</head>
<body>
  <div class="mockup-shell">
    <aside class="sidebar">
      <div class="sidebar__brand"><span class="sidebar__brand-mark"></span> KISS PM</div>
      <div class="sidebar__group">Работа</div>
      <div class="sidebar__item sidebar__item--active"><span>Проекты</span><span class="sidebar__item-badge">8</span></div>
      <div class="sidebar__footer">v0.1 dev</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar__project">
          <div class="topbar__icon">ПР</div>
          <div>
            <div class="topbar__title">Новый проект · черновик</div>
            <div class="topbar__meta"><span class="chip chip--outline">Черновик</span><span>план v1 пуст</span></div>
          </div>
        </div>
        <label class="topbar__search"><span class="muted">⌕</span><input placeholder="Найти задачу"></label>
        <div class="topbar__actions"><button class="icon-btn">●</button><button class="icon-btn">И</button></div>
      </header>
      <nav class="tabs">
        <span class="tabs__item">Обзор</span>
        <span class="tabs__item tabs__item--active">График</span>
        <span class="tabs__item">Ресурсы</span>
        <span class="tabs__item">Назначения</span>
        <span class="tabs__item">Календари</span>
        <span class="tabs__item">Сценарии</span>
        <span class="tabs__item">Baseline</span>
        <span class="tabs__item">Аудит</span>
        <span class="tabs__item">Настройки</span>
      </nav>
      <section class="content">
        <div class="state-page">
          <div class="glyph">∅</div>
          <h2>План пока пуст</h2>
          <p>Добавьте первую задачу, чтобы начать. WBS и Gantt появятся сразу, как только в плане будет хотя бы одна строка.</p>
          <div class="actions">
            <button class="btn">Импортировать из шаблона</button>
            <button class="btn btn--primary">+ Первая задача</button>
          </div>
        </div>
      </section>
      <footer class="bottom-bar bottom-bar--hidden"></footer>
    </main>
  </div>
</body>
</html>
