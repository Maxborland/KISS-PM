<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KISS PM — Загрузка плана</title>
  <link rel="stylesheet" href="_partials.css" />
  <style>
    .sk-row { display: grid; grid-template-columns: 38px 1fr 80px 92px 84px 130px; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .sk-row .sk { height: 12px; }
  </style>
</head>
<body>
  <div class="mockup-shell">
    <aside class="sidebar">
      <div class="sidebar__brand"><span class="sidebar__brand-mark"></span> KISS PM</div>
      <div class="sidebar__group">Работа</div>
      <div class="sidebar__item sidebar__item--active"><span>Проекты</span></div>
      <div class="sidebar__footer">v0.1 dev</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar__project">
          <div class="topbar__icon">ПР</div>
          <div>
            <div class="topbar__title">Производственный портал · Релиз 2</div>
            <div class="topbar__meta"><span class="chip chip--info">В работе</span><span>план v17</span></div>
          </div>
        </div>
        <label class="topbar__search"><span class="muted">⌕</span><input placeholder="Найти"></label>
        <div class="topbar__actions"><button class="icon-btn">●</button><button class="icon-btn">И</button></div>
      </header>
      <nav class="tabs">
        <span class="tabs__item">Обзор</span>
        <span class="tabs__item tabs__item--active">График</span>
        <span class="tabs__item">Ресурсы</span>
        <span class="tabs__item">Назначения</span>
        <span class="tabs__item">Календари</span>
        <span class="tabs__item">Сценарии</span>
        <span class="tabs__item">Baseline</span>
        <span class="tabs__item">Аудит</span>
        <span class="tabs__item">Настройки</span>
        <span class="tabs__status"><span class="tabs__status-dot tabs__status-dot--pending"></span> Идёт расчёт</span>
      </nav>
      <section class="content">
        <div class="page-title">
          <div>
            <h1>График</h1>
            <div class="subtitle">Загружаем calculatedPlan, baseline и зависимости…</div>
          </div>
        </div>
        <div class="card">
          <div class="card__head">
            <div class="row" style="gap:8px;">
              <span class="sk" style="width:80px;height:14px;"></span>
              <span class="sk" style="width:80px;height:14px;"></span>
              <span class="sk" style="width:80px;height:14px;"></span>
            </div>
          </div>
          <div class="card__body" style="padding: 0;">
            <div class="sk-row"><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:60%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:80%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:40%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:70%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:55%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:65%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:90%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:50%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
            <div class="sk-row"><span class="sk"></span><span class="sk" style="width:60%;"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span><span class="sk"></span></div>
          </div>
        </div>
      </section>
      <footer class="bottom-bar bottom-bar--hidden"></footer>
    </main>
  </div>
</body>
</html>
