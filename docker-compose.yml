services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${KISS_PM_POSTGRES_DB:-kiss_pm}
      POSTGRES_USER: ${KISS_PM_POSTGRES_USER:-kiss_pm}
      POSTGRES_PASSWORD: ${KISS_PM_POSTGRES_PASSWORD:-kiss_pm_dev_password}
    ports:
      - "${KISS_PM_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${KISS_PM_POSTGRES_USER:-kiss_pm} -d ${KISS_PM_POSTGRES_DB:-kiss_pm}"
        ]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - kiss_pm_postgres_data:/var/lib/postgresql/data

  dev-deps:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.33.2 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile"
    environment:
      CI: "true"
    volumes:
      - .:/workspace
      - kiss_pm_pnpm_store:/pnpm/store
      - kiss_pm_root_node_modules:/workspace/node_modules
      - kiss_pm_api_node_modules:/workspace/apps/api/node_modules
      - kiss_pm_web_node_modules:/workspace/apps/web/node_modules
      - kiss_pm_access_control_node_modules:/workspace/packages/access-control/node_modules
      - kiss_pm_domain_node_modules:/workspace/packages/domain/node_modules
      - kiss_pm_persistence_node_modules:/workspace/packages/persistence/node_modules
      - kiss_pm_test_fixtures_node_modules:/workspace/packages/test-fixtures/node_modules
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "${KISS_PM_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.33.2 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm db:migrate &&
      pnpm db:seed:dev &&
      pnpm --filter @kiss-pm/api dev"
    environment:
      DATABASE_URL: postgres://${KISS_PM_POSTGRES_USER:-kiss_pm}:${KISS_PM_POSTGRES_PASSWORD:-kiss_pm_dev_password}@postgres:5432/${KISS_PM_POSTGRES_DB:-kiss_pm}
      HOST: 0.0.0.0
      KISS_PM_ENABLE_DEV_ROUTES: "true"
      PLANNING_EVENTS_BACKEND: redis
      REDIS_URL: redis://redis:6379
      PORT: 4000
      # Media plane (self-hosted LiveKit) — opt-in. Defaults keep video disabled so
      # the standard dev stack is unchanged. To run audio/video calls, set these in
      # .env and start the media profile: docker compose --profile media up
      KISS_PM_VIDEO_PROVIDER: ${KISS_PM_VIDEO_PROVIDER:-disabled}
      KISS_PM_VIDEO_LIVEKIT_URL: ${KISS_PM_VIDEO_LIVEKIT_URL:-}
      # Server-reachable LiveKit URL for egress (the ws://localhost browser URL would resolve
      # to the API container). Compose DNS reaches the livekit service at http://livekit:7880.
      KISS_PM_VIDEO_LIVEKIT_HTTP_URL: ${KISS_PM_VIDEO_LIVEKIT_HTTP_URL:-http://livekit:7880}
      KISS_PM_VIDEO_LIVEKIT_API_KEY: ${KISS_PM_VIDEO_LIVEKIT_API_KEY:-}
      KISS_PM_VIDEO_LIVEKIT_API_SECRET: ${KISS_PM_VIDEO_LIVEKIT_API_SECRET:-}
      KISS_PM_VIDEO_TOKEN_TTL_SECONDS: ${KISS_PM_VIDEO_TOKEN_TTL_SECONDS:-600}
      KISS_PM_VIDEO_ALLOW_INSECURE_HTTP: ${KISS_PM_VIDEO_ALLOW_INSECURE_HTTP:-false}
      KISS_PM_MEDIA_READINESS_URL: ${KISS_PM_MEDIA_READINESS_URL:-}
    ports:
      - "${KISS_PM_API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dev-deps:
        condition: service_completed_successfully
    volumes:
      - .:/workspace
      - kiss_pm_pnpm_store:/pnpm/store
      - kiss_pm_root_node_modules:/workspace/node_modules
      - kiss_pm_api_node_modules:/workspace/apps/api/node_modules
      - kiss_pm_web_node_modules:/workspace/apps/web/node_modules
      - kiss_pm_access_control_node_modules:/workspace/packages/access-control/node_modules
      - kiss_pm_domain_node_modules:/workspace/packages/domain/node_modules
      - kiss_pm_persistence_node_modules:/workspace/packages/persistence/node_modules
      - kiss_pm_test_fixtures_node_modules:/workspace/packages/test-fixtures/node_modules

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack enable &&
      corepack prepare pnpm@10.33.2 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --dir apps/web exec next dev -H 0.0.0.0 -p 3000"
    environment:
      KISS_PM_API_ORIGIN: http://api:4000
      NEXT_TELEMETRY_DISABLED: 1
      WATCHPACK_POLLING: true
    ports:
      - "${KISS_PM_WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started
      dev-deps:
        condition: service_completed_successfully
    volumes:
      - .:/workspace
      - kiss_pm_pnpm_store:/pnpm/store
      - kiss_pm_root_node_modules:/workspace/node_modules
      - kiss_pm_api_node_modules:/workspace/apps/api/node_modules
      - kiss_pm_web_node_modules:/workspace/apps/web/node_modules
      - kiss_pm_web_next:/workspace/apps/web/.next
      - kiss_pm_access_control_node_modules:/workspace/packages/access-control/node_modules
      - kiss_pm_domain_node_modules:/workspace/packages/domain/node_modules
      - kiss_pm_persistence_node_modules:/workspace/packages/persistence/node_modules
      - kiss_pm_test_fixtures_node_modules:/workspace/packages/test-fixtures/node_modules

  # Self-hosted LiveKit media plane (SFU + signaling). Opt-in via the `media`
  # profile so the default dev stack is unchanged:
  #   docker compose --profile media up
  # The browser reaches signaling at ws://localhost:7880; the API reaches it for
  # the readiness probe at http://livekit:7880 (compose DNS). coturn/egress are
  # added in later epic phases (see docs/plans/communications-self-hosted-av-epic.md).
  livekit:
    image: livekit/livekit-server:v1.8
    profiles: ["media"]
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880" # HTTP + WebSocket signaling + health
      - "7881:7881" # ICE/TCP fallback
      - "50000-50019:50000-50019/udp" # RTC media (dev: small range)
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # LiveKit Egress — per-track server recording (Phase 5). Separate "recording"
  # profile (NOT "media"), because infra/egress/egress.yaml uses ${...} placeholders
  # the operator must render (envsubst / EGRESS_CONFIG_BODY) with real LiveKit + S3
  # values; keeping it out of "media" means `docker compose --profile media up` (the
  # dev A/V stack) does not start a broken egress. Full recording stack:
  #   docker compose --profile media --profile recording up
  # Records only when KISS_PM_VIDEO_EGRESS_ENABLED=true and storage=s3.
  egress:
    image: livekit/egress:v1.9
    profiles: ["recording"]
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    cap_add:
      - SYS_ADMIN # required by the egress chrome sandbox
    volumes:
      - ./infra/egress/egress.yaml:/etc/egress.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: unless-stopped

volumes:
  kiss_pm_postgres_data:
  kiss_pm_pnpm_store:
  kiss_pm_root_node_modules:
  kiss_pm_api_node_modules:
  kiss_pm_web_node_modules:
  kiss_pm_web_next:
  kiss_pm_access_control_node_modules:
  kiss_pm_domain_node_modules:
  kiss_pm_persistence_node_modules:
  kiss_pm_test_fixtures_node_modules:
