name: Bug report
description: Report reproducible broken behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private data, proprietary documents, or security exploit details.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the broken behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, traces, or command output if safe to share.
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node, pnpm, browser
    validations:
      required: false
