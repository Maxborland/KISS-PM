name: Feature request
description: Propose a focused improvement
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Keep proposals focused. Do not include confidential business plans, customer data, or private screenshots.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or tradeoffs.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What observable behavior would make this done?
    validations:
      required: true
