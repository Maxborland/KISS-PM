name: Security gates

on:
  push:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/security-scan.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/security-scan.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/security.yml"

concurrency:
  group: security-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security dependency and static scan
        run: pnpm security:check
