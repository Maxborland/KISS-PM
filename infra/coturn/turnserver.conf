# Standalone coturn (TURN/STUN) — KISS-PM media plane, PRODUCTION reference.
#
# NOT wired into the dev compose yet: a localhost 1:1 call needs no TURN, and the
# client only receives TURN credentials once the short-lived TURN-credential
# endpoint ships (epic plan Phase 6 — docs/plans/communications-self-hosted-av-epic.md).
# Kept here so the prod media topology is committed and reviewable.
#
# Why TURN: a pure SFU still fails for ~10-15% of clients behind symmetric NAT /
# restrictive firewalls. TURN over TLS (5349, optionally 443) is the relay fallback.

listening-port=3478
tls-listening-port=5349
# alt-tls-listening-port=443      # enable for hostile networks (needs a free :443)

# Relay port range — open in the firewall (separate from LiveKit's RTC UDP range).
min-port=49160
max-port=49200

realm=turn.example.com
server-name=turn.example.com

# Time-limited HMAC credentials (no static passwords). The API issues
# username=<expiry>:<userId> and credential=base64(HMAC-SHA1(secret, username)),
# sharing KISS_PM_TURN_SHARED_SECRET with this server. The secret is server-side
# only and must never appear in readiness/audit/logs.
use-auth-secret
static-auth-secret=REPLACE_WITH_KISS_PM_TURN_SHARED_SECRET

# TLS (prod): mount a cert covering turn.example.com.
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# Bind/advertise the public IP in prod.
# listening-ip=<PUBLIC_IP>
# external-ip=<PUBLIC_IP>

# Hardening.
no-multicast-peers
no-tlsv1
no-tlsv1_1
fingerprint
no-cli
